<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Movies</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <div class="nav-logo" onclick="showHome()">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#e50914"/>
          <polygon points="10,7 22,14 10,21" fill="white"/>
        </svg>
        <span>Free Movies</span>
      </div>
      <div class="nav-links">
        <a class="nav-link" data-tab="movies"  onclick="switchTab('movies')">Movies</a>
        <a class="nav-link" data-tab="series"  onclick="switchTab('series')">Series</a>
        <a class="nav-link" data-tab="anime"   onclick="switchTab('anime')">Anime</a>
      </div>
    </div>
    <div class="nav-right">
      <div class="search-bar" id="navSearchBar">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search movies, shows, anime…"
          autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()" />
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
      </div>
    </div>
  </nav>

  <!-- ── HERO ── -->
  <div class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="heroContent">
      <div class="hero-badge">🔥 Trending</div>
      <h1 class="hero-title" id="heroTitle">Loading…</h1>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-actions">
        <button class="btn-play" id="heroPlayBtn">▶ Watch Now</button>
        <button class="btn-info" id="heroInfoBtn">ℹ More Info</button>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <!-- ── SEARCH RESULTS ── -->
  <div id="searchView" style="display:none">
    <div class="page-header">
      <button class="back-btn" onclick="closeSearch()">← Back</button>
      <h2 id="searchTitle">Search Results</h2>
    </div>
    <div class="card-grid" id="searchGrid"></div>
    <div class="pagination" id="searchPager">
      <button onclick="changeSearchPage(-1)" id="sPrev">← Prev</button>
      <span id="searchPageInfo"></span>
      <button onclick="changeSearchPage(1)" id="sNext">Next →</button>
    </div>
  </div>

  <!-- ── HOME ── -->
  <div id="homeView">
    <section class="row-section">
      <h2 class="row-title">🔥 Trending This Week</h2>
      <div class="card-row" id="trendingRow"></div>
    </section>
    <section class="row-section">
      <h2 class="row-title">🎬 Popular Movies</h2>
      <div class="card-row" id="moviesRow"></div>
    </section>
    <section class="row-section">
      <h2 class="row-title">📺 Popular Series</h2>
      <div class="card-row" id="seriesRow"></div>
    </section>
    <section class="row-section">
      <h2 class="row-title">⚡ Popular Anime</h2>
      <div class="card-row" id="animeRow"></div>
    </section>
  </div>

  <!-- ── BROWSE ── -->
  <div id="browseView" style="display:none">
    <div class="browse-header">
      <h2 id="browseTitle"></h2>
      <div class="filters">
        <select id="genreFilter" onchange="applyFilters()"><option value="">All Genres</option></select>
        <select id="yearFilter"  onchange="applyFilters()"><option value="">All Years</option></select>
        <select id="sortFilter"  onchange="applyFilters()">
          <option value="popularity.desc">Most Popular</option>
          <option value="vote_average.desc">Top Rated</option>
          <option value="release_date.desc">Newest First</option>
          <option value="release_date.asc">Oldest First</option>
        </select>
      </div>
    </div>
    <div class="card-grid" id="browseGrid"></div>
    <div class="pagination">
      <button onclick="changePage(-1)">← Prev</button>
      <span id="pageInfo"></span>
      <button onclick="changePage(1)">Next →</button>
    </div>
  </div>

  <!-- ── DETAIL ── -->
  <div id="detailView" style="display:none"></div>

  <!-- ── PLAYER ── -->
  <div id="playerView" style="display:none"></div>

  <!-- ── LOADER ── -->
  <div id="loader" class="loader-overlay" style="display:none">
    <div class="loader-ring"></div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast"></div>

  <footer class="footer">
    <p>Free Movies — Powered by <a href="https://www.themoviedb.org" target="_blank">TMDB</a> &amp; VidSrc. We do not host any media.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
